name: Deploy frontend to GitHub Pages

on:
    push:
        branches: [ "main" ]
        paths:
            - "frontend/**"
            - ".github/workflows/pages.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build-and-deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install & Build
              working-directory: frontend
              run: |
                  npm ci
                  VITE_API_URL=${{ secrets.VITE_API_URL }} VITE_BASE_PATH=/Mona-School-of-Business-and-Management-TSR-Timepunch-Printer/ npm run build
                  touch dist/.nojekyll

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: frontend/dist # <-- Deploys the built folder

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
