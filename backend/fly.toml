app = "msbm-timepunch-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # You will override this in Fly.io secrets if using Supabase PostgreSQL
  # If left blank, it will safely fallback to local SQLite volume
  DATABASE_URL = "sqlite:////app/data/timesheets.db"

[vm]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = suspend
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "sqlite_data"
  destination = "/app/data"
