app = "mona-school-of-business-and-management-tsr-timepunch-printer"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # You will override this in Fly.io secrets if using Supabase PostgreSQL
  # If left blank, it will safely fallback to local SQLite volume
  DATABASE_URL = "sqlite:////app/data/timesheets.db"
  fly secrets set DATABASE_URL="postgresql://postgres.xuxzhyjsxwteapuuellv:jevountyrell@gmail.com:5432/postgres"


[vm]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1_024

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "sqlite_data"
  destination = "/app/data"
